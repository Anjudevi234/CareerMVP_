<style>

body{

    margin:0;

    background:
    linear-gradient(rgba(0,0,0,.65),
    rgba(0,0,0,.65)),
    url("images/courses.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;
}

/* Main Content */

.container{

    width:90%;
    max-width:900px;

    margin:140px auto 50px;

    text-align:center;

    color:#fff;
}

.container h1{

    font-size:55px;

    margin-bottom:40px;
}

/* Course Buttons */

.course-links{

    list-style:none;

    padding:0;
}

.course-links li{

    margin:25px 0;
}

.course-links a{

    display:block;

    max-width:400px;

    margin:auto;

    padding:18px;

    background:#0055ff;

    color:white;

    text-decoration:none;

    border-radius:12px;

    font-size:22px;

    font-weight:bold;

    transition:.3s;
}

.course-links a:hover{

    background:#003ecc;

    transform:translateY(-5px);
}

/* Back Button */

.page-header{

    width:90%;

    margin:90px auto 0;
}

.back-btn{

    background:#0055ff;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;
}

.back-btn:hover{

    background:#003ecc;
}

@media(max-width:768px){

.container{

    margin-top:120px;
}

.container h1{

    font-size:36px;
}

.course-links a{

    width:100%;

    font-size:18px;
}

}

</style>

</head>
