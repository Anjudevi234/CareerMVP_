<!-- BACK BUTTON -->

← Back

</button>

</div>

<!-- CONTACT SECTION -->

<section class="contact-section">

  <div class="contact-container">

    <!-- LEFT CONTENT -->

    <div class="contact-info">

      <h1>Contact Us</h1>

      <p>

        Have questions about careers,
        education or future opportunities?

        Contact our Career Guidance Team.

      </p>

      <!-- INFO CARDS -->

      <div class="info-box">

        <h3>Email</h3>

        <p>
          support@careerguide.com
        </p>

      </div>


      <div class="info-box">

        <h3>Location</h3>

        <p>
          Kerala, India
        </p>

      </div>

    </div>

    <!-- RIGHT FORM -->

    <div class="contact-form-box">

      <form>

        <input type="text"
        placeholder="Your Name"
        required>

        <input type="email"
        placeholder="Your Email"
        required>

        <input type="text"
        placeholder="Subject">

        <textarea
        placeholder="Your Message"
        required></textarea>

        <button type="submit">
          Send Message
        </button>

      </form>

    </div>

  </div>

</section>

<script src="script.js"></script>
